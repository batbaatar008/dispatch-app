<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диспетчерийн бүртгэл V7 - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');
        body { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 p-2 md:p-6 text-slate-800">
    <div class="max-w-full mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-xl font-black text-slate-900 border-l-4 border-blue-600 pl-3 uppercase tracking-tighter italic">
                Аваарийн тасралтын бүртгэл <span class="text-blue-600 text-sm">V7.0</span>
            </h1>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 w-full md:w-auto">
                <div class="bg-white px-4 py-2 rounded shadow-sm border border-slate-200 min-w-[120px]">
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Нийт тасралт</p>
                    <h3 id="totalCount" class="text-lg font-black">0</h3>
                </div>
                <div class="bg-white px-4 py-2 rounded shadow-sm border border-slate-200 min-w-[120px]">
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Нийт цаг /ц/</p>
                    <h3 id="totalHours" class="text-lg font-black text-orange-600">0.00</h3>
                </div>
                <div class="bg-white px-4 py-2 rounded shadow-sm border border-slate-200 min-w-[150px]">
                    <p class="text-[9px] font-bold text-slate-400 uppercase">Нийт ДТЦЭХ</p>
                    <h3 id="totalDTEH" class="text-lg font-black text-red-600">0.0</h3>
                </div>
                <button onclick="exportToExcel()" class="bg-green-600 text-white px-4 py-2 rounded font-bold text-xs hover:bg-green-700 transition shadow-md">EXCEL ТАЙЛАН</button>
            </div>
        </div>

        <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-5">
                
                <div class="space-y-3">
                    <h4 class="text-[10px] font-black text-blue-700 uppercase bg-blue-50 p-1 px-2 rounded">1. Салбар нэгж</h4>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500">Үндсэн ангилал:</label>
                        <select id="category" onchange="updateBranches()" class="w-full border p-2 rounded bg-white font-bold border-slate-300"></select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500">Салбар нэгж:</label>
                        <select id="branch" class="w-full border p-2 rounded bg-white font-bold text-blue-900 border-slate-300"></select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500">Тоноглолын нэр:</label>
                        <input type="text" id="equipName" placeholder="Жишээ: Ш-452" class="w-full border p-2 rounded border-slate-300">
                    </div>
                </div>

                <div class="space-y-3">
                    <h4 class="text-[10px] font-black text-purple-700 uppercase bg-purple-50 p-1 px-2 rounded">2. Техник үзүүлэлт</h4>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-500">Хүчдэл /кВ/:</label>
                            <select id="voltageBase" class="w-full border p-2 rounded border-slate-300 font-bold"><option value="35">35кВ</option><option value="110">110кВ</option><option value="10">10кВ</option><option value="6">6кВ</option><option value="0.4">0.4кВ</option></select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-500">Цэгийн тоо:</label>
                            <input type="number" id="pointCount" value="1" class="w-full border p-2 rounded border-slate-300 text-center font-bold">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="space-y-1 text-blue-700">
                            <label class="text-[10px] font-black italic underline">Эгшний кВ:</label>
                            <input type="number" id="momentVolt" value="35" step="0.1" class="w-full border p-2 rounded font-bold border-blue-200">
                        </div>
                        <div class="space-y-1 text-blue-700">
                            <label class="text-[10px] font-black italic underline">Эгшний А:</label>
                            <input type="number" id="momentCurrent" value="0" class="w-full border p-2 rounded font-bold border-blue-200">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500">Ачааллын коэффициент (cosφ):</label>
                        <input type="number" id="cosphi" value="0.9" step="0.01" class="w-full border p-2 rounded font-black text-center border-slate-300">
                    </div>
                </div>

                <div class="space-y-3">
                    <h4 class="text-[10px] font-black text-orange-700 uppercase bg-orange-50 p
