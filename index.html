<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диспетчерийн бүртгэл V11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');
        body { font-family: 'Manrope', sans-serif; }
        .editing-row { background-color: #fef9c3 !important; }
        label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 2px; display: block; }
    </style>
</head>
<body class="bg-slate-100 p-3 md:p-6 text-slate-800">
    <div class="max-w-[1600px] mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 border-b pb-4">
            <div>
                <h1 class="text-2xl font-black text-blue-900 italic tracking-tighter uppercase">Аваарийн тасралтын бүртгэл</h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Darkhan Selenge Distribution Network</p>
            </div>
            <div class="flex gap-4 items-center">
                <div class="bg-white px-5 py-3 rounded-xl shadow-sm border border-slate-200 text-center min-w-[150px]">
                    <p class="text-[9px] font-bold text-slate-400 uppercase leading-none">Нийт ДТЦЭХ /кВт.ц/</p>
                    <h2 id="totalDTEH" class="text-2xl font-black text-red-600 mt-1">0.0</h2>
                </div>
                <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-xl shadow-lg font-bold text-xs uppercase transition-all">Excel Тайлан</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-[11px] font-black text-blue-600 uppercase mb-4 border-b pb-1">1. Салбар нэгж</h3>
                <div class="space-y-3">
                    <div>
                        <label>Үндсэн ангилал</label>
                        <select id="category" onchange="updateBranches()" class="w-full p-2 rounded-lg border font-bold bg-slate-50 text-sm"></select>
                    </div>
                    <div>
                        <label>Салбар хэсэг</label>
                        <select id="branch" class="w-full p-2 rounded-lg border font-bold text-blue-800 text-sm"></select>
                    </div>
                    <div>
                        <label>ХБ тоноглолын нэр</label>
                        <input type="text" id="equipName" placeholder="Жишээ: Ш-452" class="w-full p-2 rounded-lg border font-bold text-sm">
                    </div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-[11px] font-black text-purple-600 uppercase mb-4 border-b pb-1">2. Техник үзүүлэлт</h3>
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label>Хүчдэл /кВ/</label>
                            <select id="voltageBase" class="w-full p-2 rounded-lg border font-bold text-sm">
                                <option value="35">35кВ</option><option value="110">110кВ</option>
                                <option value="10">10кВ</option><option value="6">6кВ</option>
                                <option value="0.4">0.4кВ</option>
                            </select>
                        </div>
                        <div>
                            <label>Цэгийн тоо</label>
                            <input type="number" id="pointCount" value="1" class="w-full p-2 rounded-lg border text-center font-bold text-sm">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label>Эгшний кВ</label>
                            <input type="number" id="momentVolt" class="w-full p-2 rounded-lg border font-bold text-blue-700 bg-blue-50 text-sm">
                        </div>
                        <div>
                            <label>Эгшний А</label>
                            <input type="number" id="momentCurrent" class="w-full p-2 rounded-lg border font-bold text-blue-700 bg-blue-50 text-sm">
                        </div>
                    </div>
                    <div>
                        <label>Чадал (cosφ)</label>
                        <input type="number" id="cosphi" value="0.9" step="0.01" class="w-full p-2 rounded-lg border text-center font-black text-sm">
                    </div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-[11px] font-black text-orange-600 uppercase mb-4 border-b pb-1">3. Огноо & Цаг</h3>
                <div class="space-y-3">
                    <div>
                        <label class="text-red-500">Тасарсан хугацаа</label>
                        <input type="datetime-local" id="startTime" oninput="updateLiveTime()" class="w-full p-2 rounded-lg border font-bold text-[11px]">
                    </div>
                    <div>
                        <label class="text-green-600">Залгасан хугацаа</label>
                        <input type="datetime-local" id="endTime" oninput="updateLiveTime()" class="w-full p-2 rounded-lg border font-bold text-[11px]">
                    </div>
                    <div class="bg-slate-900 p-3 rounded-xl text-center shadow-lg mt-1">
                        <label class="text-slate-400 mb-0">Үргэлжилсэн цаг</label>
                        <h4 id="liveTime" class="text-white text-2xl font-black leading-none">0.00</h4>
                    </div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-[11px] font-black text-red-600 uppercase mb-4 border-b pb-1">4. Гэмтэл & Цаг агаар</h3>
                <div class="space-y-3 text-sm">
                    <div>
                        <label>Ажилласан хамгаалалт</label>
                        <select id="protection" class="w-full p-2 rounded-lg border font-bold"><option>МТО</option><option>МТЗ</option><option>Газардлага</option><option>Дифференциал</option><option>Бусад</option></select>
                    </div>
                    <div>
                        <label>Цаг агаарын байдал</label>
                        <select id="weather" class="w-full p-2 rounded-lg border font-bold bg-blue-50/50">
                            <option value="Хэвийн">Хэвийн</option>
                            <option value="Цас">Цас</option>
                            <option value="Бороо">Бороо</option>
                            <option value="Шуурга">Шуурга</option>
                            <option value="Хүйтэн">Хэт хүйтэн</option>
                            <option value="Аянга">Аянга цахилгаан</option>
                        </select>
                    </div>
                    <div>
                        <label>Гэмтлийн төрөл</label>
                        <select id="fault" class="w-full p-2 rounded-lg border text-red-700 font-bold">
                            <option value="Дэд станц">Дэд станц</option>
                            <option value="АШ">АШ (Агаарын шугам)</option>
                            <option value="КШ">КШ (Кабель шугам)</option>
                            <option value="Хэт хүчдэл">Хэт хүчдэлийн хамгаалалт</option>
                            <option value="Тоноглол">Тоноглолын гэмтэл</option>
                            <option value="Тодорхойгүй">Тодорхойгүй</option>
                            <option value="Бусад">Бусад</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-[11px] font-black text-green-600 uppercase mb-4 border-b pb-1">5. Үйлдэл & Бүртгэл</h3>
                <div class="space-y-3 flex flex-col h-full">
                    <div>
                        <label>Тасралтын шалтгаан</label>
                        <textarea id="reason" rows="1" class="w-full p-2 rounded-lg border text-xs" placeholder="..."></textarea>
                    </div>
                    <div>
                        <label>Авсан арга хэмжээ</label>
                        <textarea id="action" rows="1" class="w-full p-2 rounded-lg border text-xs" placeholder="..."></textarea>
                    </div>
                    <div>
                        <label>Диспетчерийн нэр</label>
                        <input type="text" id="dispName" placeholder="Нэр оруулна уу" class="w-full p-2 rounded-lg border font-black uppercase text-xs">
                    </div>
                    <div class="pt-2">
                        <button id="saveBtn" onclick="saveEntry()" class="w-full bg-blue-600 hover:bg-black text-white py-4 rounded-xl font-black uppercase text-[10px] shadow-lg transition-all active:scale-95">Хадгалах</button>
                        <button id="cancelBtn" onclick="resetForm()" class="hidden w-full bg-slate-400 text-white py-2 rounded-lg text-[9px] font-bold mt-2">Цуцлах</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
            <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                <div class="relative">
                    <input type="text" id="search" oninput="filterTable()" placeholder="Хайлт..." class="p-2 px-10 rounded-full border text-sm w-80 outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
                    <span class="absolute left-4 top-2.5 opacity-30">🔍</span>
                </div>
                <div class="flex gap-4">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">Бүртгэл: <span id="countBadge" class="text-blue-600 text-sm">0</span></span>
                </div>
            </div>
            <div class="overflow-x-auto max-h-[550px]">
                <table class="min-w-full text-[10.5px] border-collapse" id="mainTable">
                    <thead class="bg-slate-900 text-white sticky top-0 z-20 uppercase font-bold">
                        <tr>
                            <th class="p-4 border border-slate-800">№</th>
                            <th class="p-4 border border-slate-800 text-left">Салбар</th>
                            <th class="p-4 border border-slate-800 text-left">Тоноглол</th>
                            <th class="p-4 border border-slate-800">Хүчдэл / А</th>
                            <th class="p-4 border border-slate-800">Тасарсан</th>
                            <th class="p-4 border border-slate-800">Залгасан</th>
                            <th class="p-4 border border-slate-800">Цаг</th>
                            <th class="p-4 border border-slate-800 bg-red-800/50">ДТЦЭХ</th>
                            <th class="p-4 border border-slate-800">Цаг агаар</th>
                            <th class="p-4 border border-slate-800 text-left">Гэмтэл</th>
                            <th class="p-4 border border-slate-800">Диспетчер</th>
                            <th class="p-4 border border-slate-800">Үйлдэл</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-center font-bold divide-y text-slate-700"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const branches = {
            "Компани": ["Сүхбаатар", "Хөтөл", "Зүүнхараа", "Жаргалант", "АЗА", "ЗТТА", "ХҮТ", "Бусад", "ДСЦТС ХК"],
            "Бусад ТЗЭ": ["ДТЗЭ", "ҮТЗЭ", "ТТЗЭ", "Бусад"],
            "Хэрэглэгч": ["Уул уурхай", "ААН", "Хувь хүн", "Үйлдвэр"]
        };

        let db = [];
        let editId = null;

        function updateBranches() {
            const cat = document.getElementById('category').value;
            const bSel = document.getElementById('branch');
            bSel.innerHTML = "";
            branches[cat].forEach(n => {
                const o = document.createElement('option');
                o.value = n; o.textContent = n; bSel.appendChild(o);
            });
        }

        function updateLiveTime() {
            const s = new Date(document.getElementById('startTime').value);
            const e = new Date(document.getElementById('endTime').value);
            const diff = (e - s) / (1000 * 60 * 60);
            document.getElementById('liveTime').textContent = (isNaN(diff) || diff < 0) ? "0.00" : diff.toFixed(2);
        }

        function saveEntry() {
            const s = document.getElementById('startTime').value;
            const e = document.getElementById('endTime').value;
            if(!s || !e) return alert("Хугацаа оруулна уу!");

            const diff = (new Date(e) - new Date(s)) / (1000 * 60 * 60);
            const kv = parseFloat(document.getElementById('momentVolt').value) || 0;
            const amp = parseFloat(document.getElementById('momentCurrent').value) || 0;
            const cos = parseFloat(document.getElementById('cosphi').value) || 0.9;
            const dteh = (1.732 * kv * amp * cos * diff).toFixed(1);

            const rowData = {
                id: editId || Date.now(),
                category: document.getElementById('category').value,
                branch: document.getElementById('branch').value,
                equip: document.getElementById('equipName').value || "---",
                vBase: document.getElementById('voltageBase').value,
                point: document.getElementById('pointCount').value,
                vMom: kv,
                a: amp,
                cos: cos,
                start: s,
                end: e,
                hrs: diff.toFixed(2),
                dteh: dteh,
                prot: document.getElementById('protection').value,
                weather: document.getElementById('weather').value,
                fault: document.getElementById('fault').value,
                disp: document.getElementById('dispName').value || "---",
                reason: document.getElementById('reason').value,
                action: document.getElementById('action').value
            };

            if (editId) {
                const idx = db.findIndex(r => r.id === editId);
                db[idx] = rowData;
            } else {
                db.push(rowData);
            }

            resetForm();
            render();
        }

        function editRow(id) {
            editId = id;
            const data = db.find(r => r.id === id);
            document.getElementById('category').value = data.category;
            updateBranches();
            document.getElementById('branch').value = data.branch;
            document.getElementById('equipName').value = data.equip;
            document.getElementById('voltageBase').value = data.vBase;
            document.getElementById('pointCount').value = data.point;
            document.getElementById('momentVolt').value = data.vMom;
            document.getElementById('momentCurrent').value = data.a;
            document.getElementById('cosphi').value = data.cos;
            document.getElementById('startTime').value = data.start;
            document.getElementById('endTime').value = data.end;
            document.getElementById('protection').value = data.prot;
            document.getElementById('weather').value = data.weather;
            document.getElementById('fault').value = data.fault;
            document.getElementById('dispName').value = data.disp;
            document.getElementById('reason').value = data.reason;
            document.getElementById('action').value = data.action;

            document.getElementById('saveBtn').innerText = "Шинэчлэх";
            document.getElementById('saveBtn').className = "w-full bg-orange-600 text-white py-4 rounded-xl font-black uppercase text-[10px] shadow-lg";
            document.getElementById('cancelBtn').classList.remove('hidden');
            updateLiveTime();
            render();
        }

        function resetForm() {
            editId = null;
            document.getElementById('equipName').value = "";
            document.getElementById('momentVolt').value = "";
            document.getElementById('momentCurrent').value = "";
            document.getElementById('reason').value = "";
            document.getElementById('action').value = "";
            document.getElementById('saveBtn').innerText = "Хадгалах";
            document.getElementById('saveBtn').className = "w-full bg-blue-600 hover:bg-black text-white py-4 rounded-xl font-black uppercase text-[10px] shadow-lg transition-all";
            document.getElementById('cancelBtn').classList.add('hidden');
            render();
        }

        function render() {
            const body = document.getElementById('tableBody');
            body.innerHTML = "";
            let totalD = 0;
            db.forEach((r, i) => {
                totalD += parseFloat(r.dteh);
                const isEditing = editId === r.id ? "editing-row" : "";
                body.innerHTML += `
                    <tr class="${isEditing} hover:bg-slate-50 border-b">
                        <td class="p-3 border border-slate-200">${i+1}</td>
                        <td class="p-3 border border-slate-200 text-left text-blue-900">${r.branch}</td>
                        <td class="p-3 border border-slate-200 text-left">${r.equip}</td>
                        <td class="p-3 border border-slate-200 text-blue-600 font-mono">${r.vMom}кВ / ${r.a}А</td>
                        <td class="p-3 border border-slate-200 text-red-500 font-mono text-[9px]">${r.start.replace('T', ' ')}</td>
                        <td class="p-3 border border-slate-200 text-green-600 font-mono text-[9px]">${r.end.replace('T', ' ')}</td>
                        <td class="p-3 border border-slate-200 font-black text-orange-700">${r.hrs}</td>
                        <td class="p-3 border border-slate-200 font-black text-red-700 bg-red-50/50 italic">${r.dteh}</td>
                        <td class="p-3 border border-slate-200 text-slate-500">${r.weather}</td>
                        <td class="p-3 border border-slate-200 text-left">${r.fault}</td>
                        <td class="p-3 border border-slate-200 uppercase text-[9px]">${r.disp}</td>
                        <td class="p-3 border border-slate-200 space-x-2">
                            <button onclick="editRow(${r.id})" class="text-blue-500 hover:underline">Засах</button>
                            <button onclick="deleteRow(${r.id})" class="text-red-400 hover:underline">Устгах</button>
                        </td>
                    </tr>`;
            });
            document.getElementById('totalDTEH').textContent = totalD.toFixed(1);
            document.getElementById('countBadge').textContent = db.length;
        }

        function deleteRow(id) { if(confirm("Устгах уу?")) { db = db.filter(r => r.id !== id); render(); } }
        function filterTable() {
            const q = document.getElementById('search').value.toLowerCase();
            const rows = document.querySelectorAll("#tableBody tr");
            rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? "" : "none");
        }
        function exportToExcel() {
            if(db.length === 0) return alert("Хоосон байна!");
            const ws = XLSX.utils.json_to_sheet(db);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Тасралтын Тайлан");
            XLSX.writeFile(wb, "DSEDN_Report_Final.xlsx");
        }

        window.onload = () => {
            const cat = document.getElementById('category');
            Object.keys(branches).forEach(k => {
                const o = document.createElement('option');
                o.value = k; o.textContent = k; cat.appendChild(o);
            });
            updateBranches();
            const n = new Date();
            n.setMinutes(n.getMinutes() - n.getTimezoneOffset());
            const f = n.toISOString().slice(0, 16);
            document.getElementById('startTime').value = f;
            document.getElementById('endTime').value = f;
        }
    </script>
</body>
</html>
