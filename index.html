<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диспетчерийн бүртгэл - Бүрэн хувилбар</title>
    <script src="https://cdn.tailwindcss.com"></script>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-2 mb-4 uppercase">
            <div class="bg-white p-3 rounded shadow border-b-2 border-blue-600">

            </div>
            <div class="bg-white p-3 rounded shadow border-b-2 border-red-600">
                <p class="text-gray-500 font-bold">Нийт ДТЭХ (кВт*ц)</p>
                <h3 id="totalDTEH" class="text-xl font-black">0.0</h3>
            </div>
            <div class="bg-green-600 p-3 rounded shadow flex items-center justify-center cursor-pointer hover:bg-green-700 transition" onclick="exportToExcel()">
                <button class="text-white font-black">EXCEL ТАЙЛАН ТАТАХ</button>
            </div>
        </div>
