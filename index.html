<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диспетчерийн бүртгэл - ДСЦТС ХК</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-full mx-auto bg-white p-6 rounded-xl shadow-2xl border border-gray-200">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-800 uppercase tracking-wide border-b-2 border-blue-100 pb-3">
            Хамгаалалтаар тасарсан шугам тоноглолын бүртгэлийн систем
        </h2>
        
        <div class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-8 bg-blue-50 p-6 rounded-lg border border-blue-100">
            <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-600">Салбар нэгж:</label>
                <select id="branch" class="w-full border-2 border-blue-200 p-2 rounded-md focus:border-blue-500 outline-none transition-all">
                    <option>Сүхбаатар</option><option>Хөтөл</option><option>Зүүнхараа</option><option>Жаргалант</option>
                    <option>АЗА</option><option>ЗТТА</option><option>ХҮТ</option><option>ДСЦТС ХК</option>
                </select>
            </div>
            <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-600">ХБ Хүчдэл (кВ):</label>
                <select id="voltage" class="w-full border-2 border-blue-200 p-2 rounded-md focus:border-blue-500 outline-none">
                    <option value="0.22">0.22</option><option value="0.4">0.4</option><option value="6">6</option>
                    <option value="10">10</option><option value="15">15</option><option value="35">35</option><option value="110">110</option>
                </select>
            </div>
            <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-600">Гүйдэл (А):</label>
                <input type="number" id="current" value="98" class="w-full border-2 border-blue-200 p-2 rounded-md focus:border-blue-500 outline-none">
            </div>
            <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-600">cosφ:</label>
                <input type="number" id="cosphi" value="0.9" step="0.1" class="w-full border-2 border-blue-200 p-2 rounded-md focus:border-blue-500 outline-none">
            </div>
            <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-600">Тасарсан (цаг:мин):</label>
                <input type="time" id="startTime" class="w-full border-2 border-blue-200 p-2 rounded-md focus:border-blue-500 outline-none">
            </div>
            <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-600">Залгасан (цаг:мин):</label>
                <input type="time" id="endTime" class="w-full border-2 border-blue-200 p-2 rounded-md focus:border-blue-500 outline-none">
            </div>
            <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-600">Хамгаалалт:</label>
                <select id="protection" class="w-full border-2 border-blue-200 p-2 rounded-md focus:border-blue-500 outline-none">
                    <option>МТО</option><option>МТЗ</option><option>МТЗ-I</option><option>МТЗ-II</option>
                    <option>Газардлагын хамгаалалт</option><option>Дифференциал хамгаалалт</option>
                </select>
            </div>
            <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-600">Цаг агаар:</label>
                <select id="weather" class="w-full border-2 border-blue-200 p-2 rounded-md focus:border-blue-500 outline-none">
                    <option>Тогтуун</option><option>Бороотой</option><option>Дуу цахилгаантай бороотой</option>
                    <option>Цастай</option><option>Цасан шуургатай</option><option>Шуургатай</option>
                </select>
            </div>
            <div class="space-y-1">
                <label class="block text-xs font-bold text-gray-600">Гэмтлийн төрөл:</label>
                <select id="faultType" class="w-full border-2 border-blue-200 p-2 rounded-md focus:border-blue-500 outline-none">
                    <option>АШ</option><option>КШ</option><option>Дэд станц</option><option>Тоноглолын гэмтэл</option>
                </select>
            </div>
            <div class="flex items-end lg:col-span-3">
                <button onclick="addRow()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-md hover:bg-blue-700 shadow-md transform active:scale-95 transition-all">
                    БҮРТГЭЖ ТООЦООЛОХ
                </button>
            </div>
        </div>

        <div class="overflow-x-auto rounded-lg border border-gray-200 shadow-sm">
            <table class="min-w-full border-collapse text-xs">
                <thead>
                    <tr class="bg-blue-600 text-white">
                        <th class="border border-blue-700 p-2">д/д</th>
                        <th class="border border-blue-700 p-2 text-left">Салбар</th>
                        <th class="border border-blue-700 p-2 text-center">кВ</th>
                        <th class="border border-blue-700 p-2 text-center">Тасарсан</th>
                        <th class="border border-blue-700 p-2 text-center">Залгасан</th>
                        <th class="border border-blue-700 p-2 text-center bg-blue-800">Цаг (ц)</th>
                        <th class="border border-blue-700 p-2 text-center bg-orange-500 text-white font-bold">ДТЭХ (кВт*ц)</th>
                        <th class="border border-blue-700 p-2 text-center">Хамгаалалт</th>
                        <th class="border border-blue-700 p-2 text-center text-xs">Цаг агаар</th>
                        <th class="border border-blue-700 p-2 text-center">Гэмтэл</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="bg-white divide-y divide-gray-200">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let count = 1;
        function addRow() {
            const branch = document.getElementById('branch').value;
            const voltage = parseFloat(document.getElementById('voltage').value);
            const current = parseFloat(document.getElementById('current').value);
            const cosphi = parseFloat(document.getElementById('cosphi').value);
            const weather = document.getElementById('weather').value;
            const start = document.getElementById('startTime').value;
            const end = document.getElementById('endTime').value;
            const protection = document.getElementById('protection').value;
            const faultType = document.getElementById('faultType').value;

            if(!start || !end) return alert("Цагаа оруулна уу!");

            // 1. Үргэлжилсэн цаг бодох
            const s = start.split(':');
            const e = end.split(':');
            let diffMin = (parseInt(e[0])*60 + parseInt(e[1])) - (parseInt(s[0])*60 + parseInt(s[1]));
            if (diffMin < 0) diffMin += 1440; // Хоног дамжвал
            const duration = (diffMin / 60).toFixed(2);

            // 2. ДТЭХ бодох: sqrt(3) * U * I * cosphi * T
            const dteh = (Math.sqrt(3) * voltage * current * cosphi * (diffMin / 60)).toFixed(1);

            const row = `<tr class="hover:bg-gray-50 transition-colors">
                <td class="border p-2 text-center font-bold text-gray-500">${count++}</td>
                <td class="border p-2 font-medium">${branch}</td>
                <td class="border p-2 text-center">${voltage}</td>
                <td class="border p-2 text-center">${start}</td>
                <td class="border p-2 text-center">${end}</td>
                <td class="border p-2 text-center font-bold text-blue-700 bg-blue-50">${duration}</td>
                <td class="border p-2 text-center font-bold text-orange-600 bg-orange-50">${dteh}</td>
                <td class="border p-2 text-center text-[10px]">${protection}</td>
                <td class="border p-2 text-center text-[10px]">${weather}</td>
                <td class="border p-2 text-center font-bold text-red-600">${faultType}</td>
            </tr>`;
            
            document.getElementById('tableBody').innerHTML += row;
        }
    </script>
</body>
</html>
