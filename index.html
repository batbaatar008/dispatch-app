<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диспетчерийн бүртгэл V19 - 24H Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background-color: #f1f5f9; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; padding: 20px; overflow-y: auto; }
        .modal-content { background: white; width: 100%; max-width: 1200px; border-radius: 24px; padding: 30px; margin: 20px auto; }
        .report-table th, .report-table td { border: 1px solid #cbd5e1; padding: 10px; text-align: center; }
        label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; display: block; }
        input, select { border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px; font-weight: bold; font-size: 14px; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-[1600px] mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-black text-blue-900 italic uppercase tracking-tighter">Аваарийн тасралтын бүртгэл</h1>
                <p class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Darkhan Selenge Distribution Network JSC</p>
            </div>
            <div class="flex gap-3 items-center">
                <div class="bg-white px-6 py-4 rounded-2xl shadow-sm border border-slate-200 text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Нийт ДТЦЭХ</p>
                    <h2 id="totalDTEH" class="text-2xl font-black text-red-600">0.0</h2>
                </div>
                <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-4 rounded-xl shadow-lg font-bold text-xs uppercase">Excel Татах</button>
                <button onclick="openReport()" class="bg-blue-600 hover:bg-blue-800 text-white px-6 py-4 rounded-xl shadow-lg font-bold text-xs uppercase">Тайлан Харах</button>
                <button onclick="openCharts()" class="bg-indigo-600 hover:bg-indigo-800 text-white px-6 py-4 rounded-xl shadow-lg font-bold text-xs uppercase">График Харах</button>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[32px] shadow-sm border border-slate-200 mb-10">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
                <div><label>Үндсэн ангилал</label><select id="category" onchange="updateBranches()"></select></div>
                <div><label>Салбар хэсэг</label><select id="branch" class="text-blue-800"></select></div>
                <div><label>Тоноглол</label><input type="text" id="equipName" placeholder="Жишээ: Ш-452"></div>
                <div>
                    <label>Эгшний кВ / А</label>
                    <div class="flex gap-2"><input type="number" id="momentVolt" placeholder="кВ"><input type="number" id="momentCurrent" placeholder="А"></div>
                </div>
                <div><label>Тасарсан (24H)</label><input type="datetime-local" id="startTime" step="60"></div>
                <div><label>Залгасан (24H)</label><input type="datetime-local" id="endTime" step="60"></div>
                <div><label>Цаг агаар</label><select id="weather">
                    <option>Тогтуун</option><option>Цастай</option><option>Бороотой</option><option>Шуургатай</option><option>Дуу цахилгаантай</option><option>Цасан шуургатай</option>
                </select></div>
                <div><label>Гэмтлийн төрөл</label><select id="fault" class="text-red-700">
                    <option>Дэд станц</option><option>Агаарын шугам</option><option>Кабель шугам</option><option>Хэт хүчдэл</option><option>Тоноглол</option><option>Тодорхойгүй</option>
                </select></div>
                <div class="lg:col-span-2"><label>Диспетчер</label><input type="text" id="dispName" placeholder="Диспетчерийн нэр"></div>
                <div class="lg:col-span-2 flex items-end">
                    <button id="saveBtn" onclick="saveEntry()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-sm shadow-xl active:scale-95 transition-all">Мэдээлэл Хадгалах</button>
                </div>
            </div>
        </div>

        <div class="bg-[#1e293b] rounded-[24px] shadow-2xl overflow-hidden border border-slate-800">
            <div class="overflow-x-auto">
                <table class="min-w-full text-[11px] border-collapse">
                    <thead class="bg-slate-900 text-slate-400 font-bold text-center uppercase tracking-wider">
                        <tr>
                            <th class="p-4 border-b border-slate-800">№</th>
                            <th class="p-4 border-b border-slate-800 text-left">Салбар</th>
                            <th class="p-4 border-b border-slate-800 text-left">Тоноглол</th>
                            <th class="p-4 border-b border-slate-800">кВ / А</th>
                            <th class="p-4 border-b border-slate-800">Тасарсан (24H)</th>
                            <th class="p-4 border-b border-slate-800">Залгасан (24H)</th>
                            <th class="p-4 border-b border-slate-800">Цаг</th>
                            <th class="p-4 border-b border-slate-800 bg-red-900/30 text-red-400">ДТЦЭХ</th>
                            <th class="p-4 border-b border-slate-800">Гэмтэл</th>
                            <th class="p-4 border-b border-slate-800">Үйлдэл</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-center font-bold divide-y divide-slate-800 text-white"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="reportModal" class="modal-overlay"><div class="modal-content">
        <div class="flex justify-between items-center mb-8 border-b pb-4"><h2 class="text-2xl font-black uppercase italic">Нэгтгэсэн тайлан</h2><button onclick="closeModal('reportModal')" class="bg-slate-800 text-white px-6 py-2 rounded-xl text-xs">Хаах</button></div>
        <table class="w-full report-table text-xs"><tbody id="reportTableBody"></tbody></table>
    </div></div>

    <div id="chartModal" class="modal-overlay"><div class="modal-content">
        <div class="flex justify-between items-center mb-8 border-b pb-4"><h2 class="text-2xl font-black uppercase italic">Статистик</h2><button onclick="closeModal('chartModal')" class="bg-indigo-900 text-white px-6 py-2 rounded-xl text-xs">Хаах</button></div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="h-64 border rounded-xl p-4"><canvas id="pieBranch"></canvas></div>
            <div class="h-64 border rounded-xl p-4"><canvas id="pieFault"></canvas></div>
            <div class="col-span-full h-80 border rounded-xl p-4"><canvas id="barFaultBranch"></canvas></div>
            <div class="col-span-full h-80 border rounded-xl p-4"><canvas id="barWeatherBranch"></canvas></div>
        </div>
    </div></div>

    <script>
        const branches = { "Компани": ["Сүхбаатар", "Хөтөл", "Зүүнхараа", "Жаргалант", "АЗА", "ЗТТА", "ХҮТ"], "Бусад": ["ДТЗЭ", "ҮТЗЭ", "ТТЗЭ", "Бусад"] };
        let db = JSON.parse(localStorage.getItem('DSEDN_DATA')) || [];
        let chartInstances = {};

        function updateBranches() {
            const cat = document.getElementById('category').value;
            const bSel = document.getElementById('branch');
            bSel.innerHTML = "";
            (branches[cat] || []).forEach(n => { const o = document.createElement('option'); o.value = n; o.textContent = n; bSel.appendChild(o); });
        }

        // 24 Цагаар форматлах функц
        function format24h(dtStr) {
            if(!dtStr) return "---";
            const d = new Date(dtStr);
            const date = d.toLocaleDateString('mn-MN', { year:'numeric', month:'2-digit', day:'2-digit' }).replace(/\//g, '.');
            const time = d.toLocaleTimeString('mn-MN', { hour12: false, hour: '2-digit', minute: '2-digit' });
            return `${date} ${time}`;
        }

        function saveEntry() {
            const s = document.getElementById('startTime').value;
            const e = document.getElementById('endTime').value;
            if(!s || !e) return alert("Цагаа оруулна уу!");
            
            const diff = (new Date(e) - new Date(s)) / (1000 * 3600);
            const dteh = (1.732 * (parseFloat(document.getElementById('momentVolt').value)||0) * (parseFloat(document.getElementById('momentCurrent').value)||0) * 0.9 * diff).toFixed(1);

            db.push({
                id: Date.now(),
                branch: document.getElementById('branch').value,
                equip: document.getElementById('equipName').value || "--",
                v: document.getElementById('momentVolt').value || 0,
                a: document.getElementById('momentCurrent').value || 0,
                start: s, end: e, hrs: diff.toFixed(2), dteh: dteh,
                fault: document.getElementById('fault').value,
                weather: document.getElementById('weather').value,
                disp: document.getElementById('dispName').value || "--"
            });
            localStorage.setItem('DSEDN_DATA', JSON.stringify(db));
            render();
        }

        function render() {
            const body = document.getElementById('tableBody'); body.innerHTML = "";
            let total = 0;
            db.forEach((r, i) => {
                total += parseFloat(r.dteh);
                body.innerHTML += `<tr class="border-b border-slate-800/50">
                    <td class="p-4 text-slate-500">${i+1}</td>
                    <td class="p-4 text-left text-blue-400">${r.branch}</td>
                    <td class="p-4 text-left">${r.equip}</td>
                    <td class="p-4 text-blue-300 font-mono">${r.v} / ${r.a}</td>
                    <td class="p-4 text-red-400 font-mono">${format24h(r.start)}</td>
                    <td class="p-4 text-green-400 font-mono">${format24h(r.end)}</td>
                    <td class="p-4 text-slate-300">${r.hrs}</td>
                    <td class="p-4 text-orange-400 italic bg-red-900/10">${r.dteh}</td>
                    <td class="p-4">${r.fault}</td>
                    <td class="p-4"><button onclick="deleteRow(${r.id})" class="text-red-500 hover:text-red-300">Устгах</button></td>
                </tr>`;
            });
            document.getElementById('totalDTEH').innerText = total.toFixed(1);
        }

        function openCharts() {
            document.getElementById('chartModal').style.display = 'block';
            // Chart зурах логик энд (өмнөх хувилбар дээрхтэй ижил)
            const bCounts = {}, fCounts = {};
            db.forEach(i => { bCounts[i.branch] = (bCounts[i.branch] || 0) + 1; fCounts[i.fault] = (fCounts[i.fault] || 0) + 1; });
            drawChart('pieBranch', 'pie', Object.keys(bCounts), Object.values(bCounts), ['#3b82f6','#f97316','#fbbf24','#84cc16','#a855f7']);
            drawChart('pieFault', 'pie', Object.keys(fCounts), Object.values(fCounts), ['#ef4444','#f59e0b','#10b981','#6366f1']);
        }

        function drawChart(id, type, labels, data, colors) {
            if(chartInstances[id]) chartInstances[id].destroy();
            chartInstances[id] = new Chart(document.getElementById(id), {
                type: type,
                data: { labels: labels, datasets: [{ data: data, backgroundColor: colors }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function openReport() {
            const body = document.getElementById('reportTableBody'); body.innerHTML = "";
            const groups = {};
            db.forEach(item => {
                if (!groups[item.branch]) groups[item.branch] = { count: 0, hrs: 0, dteh: 0 };
                groups[item.branch].count += 1;
                groups[item.branch].hrs += parseFloat(item.hrs);
                groups[item.branch].dteh += parseFloat(item.dteh);
            });
            let i = 1;
            for (const b in groups) {
                const d = groups[b];
                body.innerHTML += `<tr><td rowspan="3" class="font-bold">${i}</td><td class="text-left px-6">Тасралтын тоо</td><td>тоо</td><td rowspan="3" class="bg-yellow-100 font-bold">${b}</td><td class="font-bold">${d.count}</td></tr>
                    <tr class="bg-slate-50"><td class="text-left px-6">Дундаж хугацаа</td><td>цаг</td><td class="font-bold">${(d.hrs/d.count).toFixed(2)}</td></tr>
                    <tr><td class="text-left px-6 italic text-slate-500">ДТЦЭХ</td><td>кВт.ц</td><td class="font-bold text-red-600">${d.dteh.toFixed(1)}</td></tr>`;
                i++;
            }
            document.getElementById('reportModal').style.display = 'block';
        }

        function deleteRow(id) { if(confirm("Устгах уу?")) { db = db.filter(r => r.id !== id); localStorage.setItem('DSEDN_DATA', JSON.stringify(db)); render(); } }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function exportToExcel() { const ws = XLSX.utils.json_to_sheet(db); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, "DSEDN_Export.xlsx"); }

        window.onload = () => {
            const cat = document.getElementById('category');
            Object.keys(branches).forEach(k => { const o = document.createElement('option'); o.value = k; o.textContent = k; cat.appendChild(o); });
            updateBranches();
            // Default цагийг одоогийнхоор тохируулах (24h)
            const n = new Date(); n.setMinutes(n.getMinutes() - n.getTimezoneOffset());
            const cur = n.toISOString().slice(0, 16);
            document.getElementById('startTime').value = cur; document.getElementById('endTime').value = cur;
            render();
        }
    </script>
</body>
</html>
